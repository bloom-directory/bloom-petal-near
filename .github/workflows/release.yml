name: Release Petal

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    # Pin both the workflow and its CLI tooling to the same immutable commit.
    uses: bloom-directory/petal/.github/workflows/release-petal.yml@1612f6fd14d3b8a5c52c28b6e6f69051b09ba852
    with:
      petal-name: near-intents
      petal-tooling-ref: "1612f6fd14d3b8a5c52c28b6e6f69051b09ba852"
      build-command: scripts/build.sh
      expected-route-count: 24
