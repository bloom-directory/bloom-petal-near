name: Release Petal

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    # Pin both the workflow and its CLI tooling to the same immutable commit.
    uses: bloom-directory/petal/.github/workflows/release-petal.yml@b69fe526b1bd65df81276c934a9d7403e2a735bf
    with:
      petal-name: near-intents
      petal-tooling-ref: "b69fe526b1bd65df81276c934a9d7403e2a735bf"
      build-command: scripts/build.sh
      expected-route-count: 24
