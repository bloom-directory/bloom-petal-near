name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: route
      - name: Test route crate
        run: |
          scripts/check-route-architecture.sh
          cargo fmt --manifest-path route/Cargo.toml -- --check
          cargo test --manifest-path route/Cargo.toml --locked
          cargo clippy --manifest-path route/Cargo.toml --locked --all-targets -- -D warnings
      - name: Install component tools
        run: cargo install wasm-tools --version 1.249.0 --locked
      - name: Install canonical Petal toolchain
        run: cargo install --git https://github.com/bloom-directory/petal --rev 4f6fb57063a70f95cba288f68bdc139e3ecac7a5 --locked bloom-petal-cli
      - name: Build and inspect all routes
        run: |
          scripts/build.sh
          petal check --root .
          test "$(find petal/near-intents -name '*.wasm' | wc -l | tr -d ' ')" = 24
          ! rg -n 'bloom:sign/signing@' < <(find petal/near-intents -name '*.wasm' -print0 | xargs -0 -n1 wasm-tools component wit)
