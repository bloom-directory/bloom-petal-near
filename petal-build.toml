schema = "bloom.petal.build.v1"
name = "near-intents"
routes = "route/files"
output = "petal/near-intents"

[route_crate]
package = "bloom-near-intents-route"
path = "route"
alias = "near_intents_route"

[sdk]
package = "bloom-petal-sdk"
git = "https://github.com/bloom-directory/petal"
rev = "942dc5fd3eeb9b5a679d81a55f00e77c180d1fcd"

[dependencies]
alloy = { version = "2", default-features = false, features = ["dyn-abi", "sol-types", "std"] }
hex = "0.4"
serde_json = "1"
